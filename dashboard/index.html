<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agentic-OS Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .version {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .stats {
            display: flex;
            gap: 2rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: calc(100vh - 70px);
        }
        
        .panel {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .execution-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .execution-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        
        .execution-item:hover {
            border-color: var(--accent);
        }
        
        .execution-item.active {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }
        
        .execution-goal {
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .execution-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .status-badge {
            padding: 0.125rem 0.5rem;
            border-radius: 12px;
            font-size: 0.625rem;
            text-transform: uppercase;
            font-weight: 600;
        }
        
        .status-pending { background: var(--bg-tertiary); }
        .status-running { background: var(--accent); color: #fff; }
        .status-completed { background: var(--success); color: #fff; }
        .status-failed { background: var(--error); color: #fff; }
        
        .detail-panel {
            display: flex;
            flex-direction: column;
        }
        
        .terminal {
            flex: 1;
            background: #000;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.75rem;
            padding: 1rem;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }
        
        .log-entry { margin-bottom: 0.25rem; }
        .log-debug { color: var(--text-secondary); }
        .log-info { color: var(--text-primary); }
        .log-warning { color: var(--warning); }
        .log-error { color: var(--error); }
        .log-success { color: var(--success); }
        
        .progress-bar {
            height: 4px;
            background: var(--bg-tertiary);
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        
        .new-execution {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .new-execution textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            margin-bottom: 0.5rem;
        }
        
        .new-execution textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .new-execution button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .new-execution button:hover { opacity: 0.9; }
        .new-execution button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="logo">agentic-OS</div>
            <div class="version">v1.0.0</div>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-running">0</div>
                <div class="stat-label">Running</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-completed">0</div>
                <div class="stat-label">Completed</div>
            </div>
        </div>
    </div>
    
    <div class="main">
        <div class="panel">
            <div class="panel-header">
                <span>Executions</span>
                <span id="execution-count">0</span>
            </div>
            <div class="new-execution">
                <textarea id="new-goal" rows="3" placeholder="Enter your goal..."></textarea>
                <button id="new-btn" onclick="createExecution()">Execute</button>
            </div>
            <div class="panel-content">
                <div class="execution-list" id="execution-list">
                    <div class="empty-state">No executions yet</div>
                </div>
            </div>
        </div>
        
        <div class="panel detail-panel">
            <div class="panel-header">
                <span id="detail-title">Select Execution</span>
                <div id="detail-status"></div>
            </div>
            <div class="progress-bar" id="progress-bar" style="display:none;">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="terminal" id="terminal">
                <div class="log-info">[ready] Waiting for execution...</div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = '/api/v1';
        let executions = [];
        let selectedId = null;
        let ws = null;
        
        async function loadExecutions() {
            try {
                const res = await fetch(API_BASE + '/executions');
                const data = await res.json();
                executions = data.executions || [];
                renderExecutionList();
                updateStats();
            } catch (e) {
                console.error('Failed to load executions:', e);
            }
        }
        
        function renderExecutionList() {
            const list = document.getElementById('execution-list');
            document.getElementById('execution-count').textContent = executions.length;
            
            if (executions.length === 0) {
                list.innerHTML = '<div class="empty-state">No executions yet</div>';
                return;
            }
            
            list.innerHTML = executions.map(e => `
                <div class="execution-item ${e.id === selectedId ? 'active' : ''}" 
                     onclick="selectExecution('${e.id}')">
                    <div class="execution-goal">${escapeHtml(e.goal)}</div>
                    <div class="execution-meta">
                        <span class="status-badge status-${e.status}">${e.status}</span>
                        <span>${e.progress.toFixed(0)}%</span>
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats() {
            document.getElementById('stat-total').textContent = executions.length;
            document.getElementById('stat-running').textContent = 
                executions.filter(e => e.status === 'running').length;
            document.getElementById('stat-completed').textContent = 
                executions.filter(e => e.status === 'completed').length;
        }
        
        async function selectExecution(id) {
            selectedId = id;
            renderExecutionList();
            
            try {
                const res = await fetch(API_BASE + '/executions/' + id);
                const data = await res.json();
                
                if (data.execution) {
                    showExecutionDetail(data.execution);
                }
            } catch (e) {
                console.error('Failed to load execution:', e);
            }
        }
        
        function showExecutionDetail(exec) {
            document.getElementById('detail-title').textContent = 'Execution ' + exec.id.slice(-8);
            document.getElementById('detail-status').innerHTML = 
                `<span class="status-badge status-${exec.status}">${exec.status}</span>`;
            
            document.getElementById('progress-bar').style.display = 'block';
            document.getElementById('progress-fill').style.width = exec.progress + '%';
            
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = exec.logs.map(log => 
                `<div class="log-entry log-${log.level}">[${log.timestamp}] ${escapeHtml(log.message)}</div>`
            ).join('');
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        async function createExecution() {
            const goal = document.getElementById('new-goal').value.trim();
            if (!goal) return;
            
            const btn = document.getElementById('new-btn');
            btn.disabled = true;
            btn.textContent = 'Starting...';
            
            try {
                const res = await fetch(API_BASE + '/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ goal, max_iterations: 10 })
                });
                const data = await res.json();
                
                if (data.execution_id) {
                    await loadExecutions();
                    selectExecution(data.execution_id);
                    document.getElementById('new-goal').value = '';
                }
            } catch (e) {
                console.error('Failed to create execution:', e);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Execute';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(protocol + '//' + location.host + '/ws');
            
            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.event !== 'ping') {
                        handleWebSocketMessage(msg);
                    }
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };
            
            ws.onclose = () => {
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = () => {
                ws.close();
            };
        }
        
        function handleWebSocketMessage(msg) {
            switch (msg.event) {
                case 'execution:started':
                case 'execution:completed':
                case 'execution:failed':
                case 'execution:cancelled':
                    loadExecutions();
                    break;
                case 'execution:progress':
                    if (msg.data.execution_id === selectedId) {
                        updateProgress(msg.data);
                    }
                    loadExecutions();
                    break;
                case 'execution:log':
                    if (msg.data.execution_id === selectedId) {
                        appendLog(msg.data.log);
                    }
                    break;
            }
        }
        
        function updateProgress(data) {
            document.getElementById('progress-fill').style.width = data.progress + '%';
            if (data.logs) {
                data.logs.forEach(log => appendLog(log));
            }
        }
        
        function appendLog(log) {
            const terminal = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = 'log-entry log-' + log.level;
            const time = log.timestamp ? log.timestamp.split('T')[1].slice(0, 12) : '00:00:00';
            div.textContent = '[' + time + '] ' + log.message;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        loadExecutions();
        connectWebSocket();
        setInterval(loadExecutions, 5000);
    </script>
</body>
</html>
