name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt 2>/dev/null || true
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install ruff black isort
      
      - name: Check formatting
        run: |
          black --check . || true
      
      - name: Run ruff
        run: |
          ruff check . || true
      
      - name: Run isort
        run: |
          isort --check-only --diff . || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          pip install bandit safety
      
      - name: Run Bandit
        run: |
          bandit -r engine tools api -f json -o bandit-report.json || true
      
      - name: Check for known vulnerabilities
        run: |
          safety check --json || true

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: |
          docker build -t agentic-os:${{ github.sha }} .
      
      - name: Run container test
        run: |
          docker run --rm agentic-os:${{ github.sha }} python -c "print('Build successful')"

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - name: Validate Python syntax
        run: |
          python -m py_compile engine/*.py api/*.py tools/*.py
      
      - name: Check imports
        run: |
          python -c "import engine.bridge; import api.server; print('Imports OK')"
