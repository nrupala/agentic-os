name: Greet Contributors

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  welcome-pr:
    name: Welcome PR Author
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Welcome PR author
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: '👋 Thank you for your contribution, @' + author + '!\n\nWelcome to agentic-OS! We are excited to have you here.\n\nIf you have any questions, feel free to ask!'
            });

  welcome-issue:
    name: Welcome Issue Author
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    steps:
      - name: Welcome issue author
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: '👋 Thank you for opening this issue, @' + author + '!\n\nWe are excited to have you report this. Thanks for contributing to agentic-OS!'
            });
