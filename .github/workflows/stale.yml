name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest
    
    steps:
      - name: Mark Issues as Stale
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. If this
            is a feature request, please add 👍 reaction to show interest.
            
            Thank you for your contribution!
          
          close-issue-message: |
            This issue has been automatically closed because it has been marked
            as stale for 14 days with no activity. If you believe this is
            still relevant, please reopen the issue with updated information.
            
            Thank you!
          
          # PRs
          days-before-pr-stale: 60
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not
            had recent activity. If this PR is still relevant, please remove
            the stale label or add a comment.
            
            Thank you for your contribution!
          
          close-pr-message: |
            This PR has been automatically closed because it has been marked
            as stale for 14 days with no activity. If this is still relevant,
            please reopen with updates.
            
            Thank you!
          
          # Exemptions
          exempt-issue-labels: 'pinned,security,bug,enhancement'
          exempt-pr-labels: 'pinned,security,bug,enhancement'
          remove-stale-when-updated: true
          operations-per-run: 100
