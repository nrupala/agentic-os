name: Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
projects: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Thank you for suggesting a new feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: Describe the problem or pain point
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you solve this problem?
      placeholder: Describe your proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives have you considered?
      placeholder: Any other approaches you've considered

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context
      placeholder: Screenshots, mockups, examples

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for existing feature requests
        - label: I have checked if this is already possible
        - label: I am willing to help implement this feature
