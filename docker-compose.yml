# =============================================================================
# Paradise Stack - AI Agent Orchestration Platform
# 
# ONE COMMAND STARTUP:
#   docker-compose up -d
#
# Then open: http://localhost:3001
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Paradise Bridge - Main Dashboard & Agent Orchestration
  # ---------------------------------------------------------------------------
  paradise:
    build: .
    container_name: paradise-bridge
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - ~/.gitconfig:/home/paradise/.gitconfig:ro
      - ~/.ssh:/home/paradise/.ssh:ro
    environment:
      - HOST_PROJECT_ROOT=/app
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - paradise-net

networks:
  paradise-net:
    driver: bridge
